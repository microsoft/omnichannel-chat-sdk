name: npm Release

on:
  push:
    branches:
      - main
      - 'hotfix/**'
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: github.repository == 'microsoft/omnichannel-chat-sdk'
    runs-on: ubuntu-latest
    steps:
      - name: Checking out for ${{ github.ref }}
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org

      - name: Update package version from git
        if: ${{ github.ref == 'refs/heads/main' }}
        run: npx version-from-git --no-git-tag-version

      - name: Read package.json
        id: read-package-json
        run: |
          echo "name=$(jq -r '.name' package.json)" >> "$GITHUB_OUTPUT"
          echo "version=$(jq -r '.version' package.json)" >> "$GITHUB_OUTPUT"

      - name: Determine npm dist-tag
        id: dist-tag
        run: |
          if [[ "${{ github.ref }}" == refs/heads/hotfix/* ]]; then
            echo "tag=hotfix" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Install packages
        run: npm install

      - name: Build
        run: npm run build:tsc

      - name: Publish ${{ steps.read-package-json.outputs.name }}@${{ steps.read-package-json.outputs.version }}
        run: npx npm@11.12.1 publish --provenance --tag ${{ steps.dist-tag.outputs.tag }} --access public
