name: npm Release

on:
  push:
    branches:
      - main
      - 'hotfix/**'
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checking out for ${{ github.ref }}
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Update package version from git
        if: ${{ github.ref == 'refs/heads/main' }}
        run: npx version-from-git --no-git-tag-version

      - name: Read package.json
        id: read-package-json
        run: |
          echo "name=$(jq -r '.name' package.json)" >> "$GITHUB_OUTPUT"
          echo "version=$(jq -r '.version' package.json)" >> "$GITHUB_OUTPUT"

      - name: Install packages
        run: npm install

      - name: Build
        run: npm run build:tsc

      - name: Publish ${{ steps.read-package-json.outputs.name }}@${{ steps.read-package-json.outputs.version }}
        run: npm publish --provenance --tag latest --access public
